<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Heretic OS | Professional Platform</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --panel: #0a0a0a;
            --accent: #ffffff;
            --accent-soft: rgba(255, 255, 255, 0.05);
            --border: #1a1a1a;
            --text: #ededed;
            --text-muted: #888888;
            --danger: #ff453a;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        #bg-flow { position: fixed; inset: 0; z-index: -1; opacity: 0.3; pointer-events: none; }

        .app-layout { display: flex; height: 100vh; }

        /* Sessions Sidebar */
        .sessions-bar { 
            width: 240px; background: var(--bg); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px 0;
        }
        .session-header { padding: 0 20px 20px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .new-chat-btn { background: var(--text); color: var(--bg); border: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        
        .session-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
        .session-item { padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item:hover { background: var(--accent-soft); color: var(--text); }
        .session-item.active { background: var(--accent-soft); color: var(--text); border: 1px solid var(--border); }

        /* Main Workspace */
        .workspace { flex: 1; display: flex; flex-direction: column; background: var(--panel); position: relative; }
        .workspace-header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; justify-content: space-between; }
        
        #chat-scroller { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 40px; scroll-behavior: smooth; }

        .msg { display: flex; flex-direction: column; gap: 10px; max-width: 100%; position: relative; }
        .msg-user { align-items: flex-end; }
        .msg-bubble { padding: 15px 0; line-height: 1.6; font-size: 1.05rem; width: 100%; border-top: 1px solid transparent; }
        .msg-user .msg-bubble { color: var(--text); font-weight: 500; border-top: 1px solid var(--border); padding-top: 20px; }
        .msg-agent .msg-bubble { color: var(--text); }

        .attachment-preview { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .img-thumb { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
        .file-pill { background: var(--accent-soft); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; border: 1px solid var(--border); }

        .reasoning { background: #080808; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); font-size: 0.9rem; color: var(--text-muted); }
        .reasoning summary { cursor: pointer; font-weight: 600; color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Input Zone */
        .input-zone { padding: 20px 15% 40px 15%; background: var(--panel); border-top: 1px solid var(--border); }
        .tray { display: flex; gap: 10px; padding-bottom: 15px; flex-wrap: wrap; }
        .tray-item { position: relative; }
        .tray-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
        .tray-item .remove { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .input-box {
            background: #000; border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 20px; display: flex; align-items: flex-end; gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; resize: none; max-height: 200px; padding: 5px 0; }
        
        .tool-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; border-radius: 6px; transition: 0.2s; }
        .tool-btn:hover { background: var(--accent-soft); color: var(--text); }
        .send-btn { background: var(--text); color: var(--bg); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .stop-btn { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: none; }

        /* Right Sidebar */
        .utility-bar { 
            width: 300px; background: var(--bg); border-left: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; gap: 20px;
        }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
        .card-title { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .metric { display: flex; flex-direction: column; }
        .metric label { font-size: 0.6rem; color: #555; }
        .metric span { font-size: 0.9rem; font-weight: 600; }

        #telemetry-box { flex: 1; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #444; }

        /* Markdown Styles */
        pre { background: #0d0d0d !important; padding: 20px; border-radius: 8px; border: 1px solid var(--border); position: relative; overflow-x: auto; margin: 15px 0; }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        .copy-code { position: absolute; top: 10px; right: 10px; background: var(--accent-soft); color: #888; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; cursor: pointer; opacity: 0; }
        pre:hover .copy-code { opacity: 1; }
        table { border-collapse: collapse; width: 100%; margin: 15px 0; }
        th, td { border: 1px solid var(--border); padding: 10px; font-size: 0.9rem; }
        th { background: var(--accent-soft); }

        /* Settings Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--border); padding: 40px; border-radius: 12px; width: 700px; display: flex; flex-direction: column; gap: 20px; }
        .modal-content h2 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 0.8rem; color: var(--text-muted); }
        .field textarea { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 15px; color: white; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; height: 300px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-flow"></canvas>

    <div class="app-layout">
        <!-- Sessions Sidebar -->
        <aside class="sessions-bar">
            <div class="session-header">
                <span style="font-weight: 800; font-size: 0.9rem; letter-spacing: 1px;">OMNI-HERETIC</span>
                <button class="new-chat-btn" onclick="newSession()">NEW</button>
            </div>
            <div id="session-list" class="session-list"></div>
            <div style="padding: 20px; border-top: 1px solid var(--border);">
                <button class="tool-btn" style="width:100%; text-align:left; font-size: 0.8rem;" onclick="toggleSettings()">⚙️ SETTINGS</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="workspace">
            <header class="workspace-header">
                <div id="session-title" style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Default Session</div>
                <div style="display:flex; gap:10px;">
                    <div id="status-chip" style="font-size: 0.7rem; color: #444; font-weight: 700; text-transform: uppercase;">READY</div>
                </div>
            </header>

            <div id="chat-scroller"></div>

            <div class="input-zone">
                <div id="input-tray" class="tray"></div>
                <div class="input-box">
                    <input type="file" id="file-upload" style="display:none" multiple accept="image/*,text/*,.json,.js,.py,.html,.css,.md">
                    <button class="tool-btn" onclick="document.getElementById('file-upload').click()">📎</button>
                    <textarea id="main-input" rows="1" placeholder="Type a message or drop files..."></textarea>
                    <button id="send-btn" class="send-btn" onclick="send()">SEND</button>
                    <button id="stop-btn" class="stop-btn" onclick="stop()">STOP</button>
                </div>
            </div>
        </main>

        <!-- Right Utility Sidebar -->
        <aside class="utility-bar">
            <div class="card">
                <div class="card-title">System Metrics</div>
                <div class="metrics-grid">
                    <div class="metric"><label>CPU</label><span id="m-cpu">0%</span></div>
                    <div class="metric"><label>RAM</label><span id="m-ram">0%</span></div>
                    <div class="metric"><label>GPU</label><span id="m-gpu">0%</span></div>
                    <div class="metric"><label>DISK</label><span id="m-disk">0%</span></div>
                </div>
            </div>

            <div class="card" style="flex:1; display:flex; flex-direction:column;">
                <div class="card-title">Activity Telemetry</div>
                <div id="telemetry-box"></div>
            </div>

            <div class="card">
                <div class="card-title">Project Explorer</div>
                <div id="file-explorer" style="font-size:0.75rem; color: #666; max-height: 200px; overflow-y: auto;"></div>
            </div>
        </aside>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Platform Settings</h2>
                <button class="tool-btn" onclick="toggleSettings()">✕</button>
            </div>
            
            <div class="field">
                <label>Custom System Instructions (Unrestricted Mode Enabled)</label>
                <textarea id="s-instructions"></textarea>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="field">
                    <label>Temperature (<span id="v-temp">0.8</span>)</label>
                    <input type="range" id="s-temp" min="0" max="2" step="0.1" value="0.8" oninput="document.getElementById('v-temp').textContent=this.value">
                </div>
                <div class="field">
                    <label>Context Window (Tokens)</label>
                    <input type="number" id="s-ctx" value="32768" style="background:#000; border:1px solid var(--border); color:white; padding:8px; border-radius:4px;">
                </div>
            </div>

            <button class="send-btn" style="width:100%; margin-top:10px;" onclick="saveSettings()">SAVE CONFIGURATION</button>
        </div>
    </div>

    <script>
        const socket = io();
        const scroller = document.getElementById('chat-scroller');
        const mainInput = document.getElementById('main-input');
        const tray = document.getElementById('input-tray');
        const telBox = document.getElementById('telemetry-box');
        
        let currentSid = 'default';
        let attachments = [];
        let agentMsg = null;
        let reasoning = null;

        marked.setOptions({ 
            highlight: (code, lang) => hljs.highlightAuto(code).value,
            breaks: true,
            gfm: true
        });

        // Background
        const canvas = document.getElementById('bg-flow');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function initBg() {
            canvas.width = innerWidth; canvas.height = innerHeight;
            dots = [];
            for(let i=0; i<80; i++) dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 });
        }
        function drawBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            dots.forEach((d, i) => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx*=-1;
                if(d.y<0 || d.y>canvas.height) d.vy*=-1;
                dots.forEach((d2, j) => {
                    if(i===j) return;
                    let dist = Math.hypot(d.x-d2.x, d.y-d2.y);
                    if(dist < 150) { ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d2.x, d2.y); ctx.stroke(); }
                });
            });
            requestAnimationFrame(drawBg);
        }
        initBg(); drawBg(); window.onresize = initBg;

        // Messaging
        function send() {
            const text = mainInput.value.trim();
            if(!text && attachments.length === 0) return;

            appendMessage('user', text, attachments);
            
            socket.emit('message', { 
                text: text, 
                files: attachments, 
                sid: currentSid 
            });

            mainInput.value = '';
            attachments = [];
            tray.innerHTML = '';
            mainInput.style.height = 'auto';
            
            document.getElementById('send-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';
            document.getElementById('status-chip').textContent = 'THINKING';
            document.getElementById('status-chip').style.color = '#fff';
        }

        function appendMessage(role, text, files = []) {
            const container = document.createElement('div');
            container.className = `msg msg-${role}`;
            
            let html = '';
            if(files.length > 0) {
                html += '<div class="attachment-preview">';
                files.forEach(f => {
                    if(f.type.startsWith('image/')) html += `<img src="${f.content}" class="img-thumb">`;
                    else html += `<div class="file-pill">${f.name}</div>`;
                });
                html += '</div>';
            }
            
            html += `<div class="msg-bubble">${marked.parse(text)}</div>`;
            container.innerHTML = html;
            
            container.querySelectorAll('pre').forEach(pre => {
                const b = document.createElement('button');
                b.className = 'copy-code'; b.textContent = 'COPY';
                b.onclick = () => { navigator.clipboard.writeText(pre.innerText); b.textContent = 'COPIED'; setTimeout(() => b.textContent='COPY', 2000); };
                pre.appendChild(b);
            });

            scroller.appendChild(container);
            scroller.scrollTop = scroller.scrollHeight;
            hljs.highlightAll();
            return container;
        }

        socket.on('bot', (d) => {
            if(d.type === 'step') {
                document.getElementById('status-chip').textContent = d.content;
            } else if(d.type === 'thought') {
                if(!reasoning) {
                    reasoning = document.createElement('details');
                    reasoning.className = 'reasoning';
                    reasoning.open = true;
                    reasoning.innerHTML = '<summary>Cognitive Planner</summary><div style="white-space:pre-wrap; margin-top:10px;"></div>';
                    scroller.appendChild(reasoning);
                }
                reasoning.querySelector('div').textContent += d.content;
                scroller.scrollTop = scroller.scrollHeight;
            } else if(d.type === 'stream') {
                if(!agentMsg) {
                    reasoning = null;
                    agentMsg = document.createElement('div');
                    agentMsg.className = 'msg msg-agent';
                    agentMsg.innerHTML = '<div class="msg-bubble"></div>';
                    scroller.appendChild(agentMsg);
                }
                const bubble = agentMsg.querySelector('.msg-bubble');
                bubble.raw = (bubble.raw || "") + d.content;
                bubble.innerHTML = marked.parse(bubble.raw);
                
                bubble.querySelectorAll('pre').forEach(pre => {
                    if(!pre.querySelector('.copy-code')) {
                        const b = document.createElement('button');
                        b.className = 'copy-code'; b.textContent = 'COPY';
                        b.onclick = () => { navigator.clipboard.writeText(pre.innerText); b.textContent = 'COPIED'; setTimeout(() => b.textContent='COPY', 2000); };
                        pre.appendChild(b);
                    }
                });
                hljs.highlightAll();
                scroller.scrollTop = scroller.scrollHeight;
            } else if(d.type === 'end') {
                agentMsg = null; reasoning = null;
                document.getElementById('send-btn').style.display = 'block';
                document.getElementById('stop-btn').style.display = 'none';
                document.getElementById('status-chip').textContent = 'READY';
                document.getElementById('status-chip').style.color = '#444';
            }
        });

        // Session Management
        function newSession() {
            const name = prompt("Session Name:", `Project ${Date.now().toString().slice(-4)}`);
            if(name) {
                currentSid = name;
                document.getElementById('session-title').textContent = name;
                scroller.innerHTML = '';
                socket.emit('switch_session', name);
                updateSessions();
            }
        }

        function switchSession(sid) {
            currentSid = sid;
            document.getElementById('session-title').textContent = sid;
            scroller.innerHTML = '';
            socket.emit('switch_session', sid);
            updateSessions();
        }

        async function updateSessions() {
            const res = await fetch('/api/status');
            const data = await res.json();
            const list = document.getElementById('session-list');
            list.innerHTML = '';
            data.sessions.forEach(s => {
                const el = document.createElement('div');
                el.className = `session-item ${s === currentSid ? 'active' : ''}`;
                el.textContent = s;
                el.onclick = () => switchSession(s);
                list.appendChild(el);
            });
        }

        socket.on('history', (history) => {
            scroller.innerHTML = '';
            history.forEach(m => {
                if(m.role !== 'system') {
                    appendMessage(m.role === 'assistant' ? 'agent' : 'user', m.content);
                }
            });
        });

        // Telemetry & Metrics
        socket.on('telemetry', (d) => {
            const el = document.createElement('div');
            el.style.marginBottom = '4px';
            el.innerHTML = `<span style="color:#666">[${new Date().toLocaleTimeString()}]</span> <span style="color:var(--text); font-weight:700">${d.cat}</span> ${d.msg}`;
            telBox.appendChild(el);
            telBox.scrollTop = telBox.scrollHeight;
        });

        async function syncStatus() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                document.getElementById('m-cpu').textContent = Math.round(d.metrics.cpu) + '%';
                document.getElementById('m-ram').textContent = Math.round(d.metrics.ram) + '%';
                document.getElementById('m-disk').textContent = d.metrics.disk + '%';
                if(d.metrics.gpus.length) document.getElementById('m-gpu').textContent = Math.round(d.metrics.gpus[0].load) + '%';
                
                // Explorer Update (Simplified)
                const explorer = document.getElementById('file-explorer');
                explorer.innerHTML = '';
                // We'd need a dedicated API for real explorer, but status gives sessions which is a start
                d.sessions.forEach(s => {
                    const el = document.createElement('div');
                    el.style.padding = '2px 0';
                    el.textContent = `📁 session/${s}.json`;
                    explorer.appendChild(el);
                });
            } catch(e) {}
        }
        setInterval(syncStatus, 3000);
        syncStatus();
        updateSessions();

        // Settings
        async function toggleSettings() {
            const m = document.getElementById('settings-modal');
            const vis = m.style.display === 'flex';
            if(!vis) {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('s-instructions').value = data.config.instructions;
                document.getElementById('s-temp').value = data.config.temperature;
                document.getElementById('v-temp').textContent = data.config.temperature;
                document.getElementById('s-ctx').value = data.config.num_ctx;
            }
            m.style.display = vis ? 'none' : 'flex';
        }

        async function saveSettings() {
            const cfg = {
                instructions: document.getElementById('s-instructions').value,
                temperature: parseFloat(document.getElementById('s-temp').value),
                num_ctx: parseInt(document.getElementById('s-ctx').value)
            };
            await fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(cfg)
            });
            toggleSettings();
            telemetry("Platform Configuration Updated", "SYSTEM");
        }

        // Utils
        document.getElementById('file-upload').onchange = (e) => {
            for(const f of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    attachments.push({ name: f.name, type: f.type, content: ev.target.result });
                    const item = document.createElement('div');
                    item.className = 'tray-item';
                    if(f.type.startsWith('image/')) item.innerHTML = `<img src="${ev.target.result}"><div class="remove" onclick="removeFile('${f.name}')">✕</div>`;
                    else item.innerHTML = `<div class="file-pill" style="height:60px; display:flex; align-items:center;">${f.name}</div><div class="remove" onclick="removeFile('${f.name}')">✕</div>`;
                    tray.appendChild(item);
                };
                if(f.type.startsWith('image/')) reader.readAsDataURL(f);
                else reader.readAsText(f);
            }
        };

        function removeFile(name) {
            attachments = attachments.filter(a => a.name !== name);
            tray.innerHTML = '';
            attachments.forEach(a => {
                const item = document.createElement('div');
                item.className = 'tray-item';
                if(a.type.startsWith('image/')) item.innerHTML = `<img src="${a.content}"><div class="remove" onclick="removeFile('${a.name}')">✕</div>`;
                else item.innerHTML = `<div class="file-pill" style="height:60px; display:flex; align-items:center;">${a.name}</div><div class="remove" onclick="removeFile('${a.name}')">✕</div>`;
                tray.appendChild(item);
            });
        }

        function stop() { socket.emit('stop'); }

        mainInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        mainInput.oninput = () => { mainInput.style.height = 'auto'; mainInput.style.height = mainInput.scrollHeight + 'px'; };
    </script>
</body>
</html>
