<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Heretic God Mode</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #020204;
            --panel: rgba(10, 10, 15, 0.95);
            --border: rgba(139, 92, 246, 0.3);
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.4);
            --text: #f8fafc;
            --text-dim: #475569;
            --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', system-ui; 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Neural Canvas */
        #neural-flow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        #sidebar { 
            width: 320px; background: var(--panel); backdrop-filter: blur(40px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; 
            padding: 24px; gap: 20px; z-index: 100;
        }

        #main { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 50; }

        .brand h1 { margin: 0; font-size: 1.6rem; letter-spacing: 6px; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

        /* Stop Button */
        #stop-btn { 
            background: var(--danger); color: white; border: none; padding: 12px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; display: none;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Verbose Console */
        #verbose-console {
            background: rgba(0,0,0,0.8); border: 1px solid var(--border); height: 150px;
            margin-top: auto; border-radius: 12px; overflow-y: auto; padding: 12px;
            font-family: 'Fira Code', monospace; font-size: 0.7rem; color: #10b981;
        }
        .log-entry { margin-bottom: 4px; display: flex; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .log-lvl { font-weight: bold; color: var(--accent); }

        #chat-window { 
            flex: 1; overflow-y: auto; padding: 50px 12%; 
            display: flex; flex-direction: column; gap: 40px; scroll-behavior: smooth;
        }

        .bubble { 
            padding: 24px; border-radius: 20px; line-height: 1.8; font-size: 1.1rem; 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .user-bubble { background: rgba(139, 92, 246, 0.1); align-self: flex-end; max-width: 85%; border-color: var(--border); }
        .bot-bubble { align-self: flex-start; width: 100%; position: relative; }

        .thought-layer {
            background: rgba(0, 0, 0, 0.4); border-left: 3px solid var(--accent);
            padding: 15px; margin-bottom: 20px; border-radius: 4px; font-size: 0.9rem;
        }
        .thought-layer summary { color: var(--accent); font-weight: bold; cursor: pointer; padding-bottom: 8px; }

        #input-zone { padding: 40px 12%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-top: 1px solid var(--border); }
        #input-container { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 35px;
            padding: 12px 24px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.1rem; resize: none; max-height: 300px; }

        /* Stats Grid */
        .hud-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 0.75rem; color: var(--text-dim); }
        .hud-card { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .bar-wrap { height: 4px; background: #111; border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); transition: 0.8s; width: 0%; }

        .icon-btn { background: rgba(255,255,255,0.05); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { background: var(--accent); color: black; }
        
        pre { background: #000 !important; padding: 20px; border-radius: 15px; border: 1px solid #1a1a20; }
        code { font-family: 'Fira Code', monospace; }

        /* Settings */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-body { background: #0a0a0f; border: 1px solid var(--border); padding: 40px; border-radius: 24px; width: 600px; display: flex; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>

    <canvas id="neural-flow"></canvas>

    <div id="sidebar">
        <div class="brand">
            <h1>HERETIC</h1>
            <p>God Mode Terminal</p>
        </div>

        <div class="hud-stats">
            <div class="hud-card">CPU <span id="txt-cpu">0%</span><div class="bar-wrap"><div id="bar-cpu" class="bar-fill"></div></div></div>
            <div class="hud-card">GPU <span id="txt-gpu">0%</span><div class="bar-wrap"><div id="bar-gpu" class="bar-fill"></div></div></div>
            <div class="hud-card">RAM <span id="txt-ram">0%</span><div class="bar-wrap"><div id="bar-ram" class="bar-fill"></div></div></div>
            <div class="hud-card">NET <span id="txt-net">0 KB</span></div>
        </div>

        <button id="stop-btn" onclick="stopNeural()">STOP CONVERGENCE</button>

        <nav style="display:flex; flex-direction:column; gap:8px">
            <button class="icon-btn" style="width:100%; border-radius:12px;" onclick="toggleSettings()">NEURAL PARAMETERS</button>
            <button class="icon-btn" style="width:100%; border-radius:12px;" onclick="wipeMemory()">PURGE CORE HISTORY</button>
            <button class="icon-btn" style="width:100%; border-radius:12px;" onclick="triggerVision()">SYNC VISION</button>
        </nav>

        <div id="verbose-console">
            <div class="log-entry"><span class="log-lvl">SYS</span> Initialize God Mode...</div>
        </div>

        <div style="font-size: 0.6rem; color: var(--text-dim); text-align:center; letter-spacing:3px">
            VHALOO // NEURAL ARCHITECT
        </div>
    </div>

    <div id="main">
        <div id="chat-window"></div>

        <div id="input-zone">
            <div id="input-container">
                <input type="file" id="file-input" style="display:none" multiple>
                <button class="icon-btn" onclick="document.getElementById('file-input').click()">📎</button>
                <textarea id="user-input" rows="1" placeholder="Enter Command..."></textarea>
                <button id="send-btn" class="icon-btn" style="background:var(--accent); color:black; width:auto; padding:0 25px; border-radius:25px; font-weight:bold">SEND</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-body">
            <h2>Neural Matrix Configuration</h2>
            <label>Temperature (Creativity)</label>
            <input type="range" id="cfg-temp" min="0" max="2" step="0.1" value="0.8">
            <label>Neural Depth (Top P)</label>
            <input type="range" id="cfg-topp" min="0" max="1" step="0.05" value="0.9">
            <label>Context Limit</label>
            <input type="number" id="cfg-ctx" value="32768" style="background:#000; color:#fff; border:1px solid var(--border); padding:10px">
            <button class="icon-btn" style="width:100%; border-radius:12px; background:var(--accent); color:black" onclick="toggleSettings()">APPLY MATRIX</button>
        </div>
    </div>

    <script>
        const socket = io();
        const chatWin = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const consoleEl = document.getElementById('verbose-console');
        const stopBtn = document.getElementById('stop-btn');
        
        let currentBotMsg = null;
        let currentThought = null;

        marked.setOptions({ highlight: (c) => hljs.highlightAuto(c).value, breaks: true });

        // Console Logging
        socket.on('internal_log', (d) => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-lvl">${d.level}</span> ${d.msg}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        });

        // Neural Convergence Flow
        const canvas = document.getElementById('neural-flow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let speedMult = 1;

        function initParticles() {
            particles = [];
            for(let i=0; i<150; i++) {
                particles.push({ x: Math.random()*innerWidth, y: Math.random()*innerHeight, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
            }
        }
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = `rgba(167, 139, 250, 0.05)`;
            particles.forEach(p => {
                p.x += p.vx * speedMult; p.y += p.vy * speedMult;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.stroke();
            });
            requestAnimationFrame(draw);
        }
        initParticles(); draw();

        // Chat Loop
        function sendMessage() {
            const msg = userInput.value.trim();
            if(!msg) return;
            
            const wrap = document.createElement('div');
            wrap.className = 'msg-wrap';
            wrap.innerHTML = `<div class="bubble user-bubble">${msg}</div>`;
            chatWin.appendChild(wrap);

            socket.emit('user_message', { 
                message: msg, 
                options: {
                    temperature: parseFloat(document.getElementById('cfg-temp').value),
                    top_p: parseFloat(document.getElementById('cfg-topp').value),
                    num_ctx: parseInt(document.getElementById('cfg-ctx').value)
                }
            });

            userInput.value = '';
            stopBtn.style.display = 'block';
            chatWin.scrollTo(0, chatWin.scrollHeight);
        }

        socket.on('bot_response', (data) => {
            if(data.type === 'thought') {
                if(!currentThought) {
                    currentThought = document.createElement('details');
                    currentThought.className = 'thought-layer';
                    currentThought.open = true;
                    currentThought.innerHTML = '<summary>DEEP NEURAL PLANNER</summary><div></div>';
                    chatWin.appendChild(currentThought);
                }
                currentThought.querySelector('div').textContent += data.content;
            } else if(data.type === 'stream') {
                if(!currentBotMsg) {
                    currentThought = null;
                    currentBotMsg = document.createElement('div');
                    currentBotMsg.className = 'bubble bot-bubble';
                    chatWin.appendChild(currentBotMsg);
                }
                currentBotMsg.raw = (currentBotMsg.raw || "") + data.content;
                currentBotMsg.innerHTML = marked.parse(currentBotMsg.raw);
                hljs.highlightAll();
            } else if(data.type === 'stream_end') {
                currentBotMsg = null;
                currentThought = null;
                stopBtn.style.display = 'none';
            }
            chatWin.scrollTo(0, chatWin.scrollHeight);
        });

        // Stop Control
        function stopNeural() {
            socket.emit('stop_generation');
            stopBtn.style.display = 'none';
        }

        // Stats HUD
        let lastNet = 0;
        async function updateHUD() {
            const res = await fetch('/api/status');
            const d = await res.json();
            if(d.stats) {
                document.getElementById('txt-cpu').textContent = Math.round(d.stats.cpu) + '%';
                document.getElementById('bar-cpu').style.width = d.stats.cpu + '%';
                document.getElementById('txt-ram').textContent = Math.round(d.stats.ram) + '%';
                document.getElementById('bar-ram').style.width = d.stats.ram + '%';
                
                const gpu = d.stats.gpus.length > 0 ? d.stats.gpus[0].load : 0;
                document.getElementById('txt-gpu').textContent = Math.round(gpu) + '%';
                document.getElementById('bar-gpu').style.width = gpu + '%';

                const netNow = d.stats.net_recv + d.stats.net_sent;
                const speed = Math.round((netNow - lastNet) / 1024);
                document.getElementById('txt-net').textContent = speed + ' KB/s';
                lastNet = netNow;

                speedMult = 1 + (d.stats.cpu / 15);
            }
        }
        setInterval(updateHUD, 1500);

        // Utils
        function toggleSettings() { const m = document.getElementById('modal-settings'); m.style.display = (m.style.display === 'flex' ? 'none' : 'flex'); }
        function wipeMemory() { if(confirm('Purge history?')) { socket.emit('clear_history'); chatWin.innerHTML = ''; } }
        function triggerVision() { socket.emit('user_message', { message: "Capture screen and analyze." }); }

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = userInput.scrollHeight + 'px'; });
    </script>
</body>
</html>
