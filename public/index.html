<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heretic OS | Pro Interface</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #030305;
            --panel: rgba(10, 10, 15, 0.9);
            --border: rgba(139, 92, 246, 0.2);
            --accent: #a78bfa;
            --accent-dim: rgba(167, 139, 250, 0.1);
            --text: #f8fafc;
            --text-dim: #475569;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Animated Flow */
        #flow-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.5; }

        .app { display: flex; height: 100vh; backdrop-filter: blur(15px); }

        /* Left Side: System Control */
        .side { 
            width: 340px; background: var(--panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 30px; gap: 24px;
        }

        .brand h1 { margin: 0; font-size: 1.8rem; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 20px var(--accent-dim); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 15px; border-radius: 15px; }
        .stat label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat div { font-size: 1.1rem; font-weight: 800; color: var(--accent); margin-top: 5px; }

        /* System Trace Console */
        #trace-view { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); height: 200px;
            border-radius: 12px; overflow-y: auto; padding: 15px; font-family: 'Fira Code', monospace; font-size: 0.7rem;
        }
        .trace-line { margin-bottom: 4px; display: flex; gap: 10px; opacity: 0.8; }
        .trace-tag { font-weight: bold; color: var(--accent); min-width: 50px; }

        /* Main Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #scroller { flex: 1; overflow-y: auto; padding: 60px 10%; display: flex; flex-direction: column; gap: 40px; scroll-behavior: smooth; }

        .bubble { padding: 25px; border-radius: 24px; line-height: 1.8; font-size: 1.1rem; background: rgba(255,255,255,0.02); border: 1px solid var(--border); position: relative; }
        .user-bubble { align-self: flex-end; max-width: 80%; background: var(--accent-dim); border-color: var(--accent); border-radius: 24px 24px 4px 24px; }
        .bot-bubble { align-self: flex-start; width: 100%; }

        .think-box { background: rgba(0,0,0,0.3); border-left: 3px solid var(--accent); padding: 20px; margin-bottom: 20px; border-radius: 8px; font-size: 0.95rem; }
        .think-box summary { cursor: pointer; color: var(--accent); font-weight: 800; margin-bottom: 10px; }

        /* Advanced Input */
        .input-area { padding: 40px 10%; border-top: 1px solid var(--border); background: rgba(0,0,0,0.4); }
        
        #file-previews { display: none; gap: 12px; padding-bottom: 15px; flex-wrap: wrap; }
        .preview-card { background: var(--panel); border: 1px solid var(--accent); padding: 8px 12px; border-radius: 10px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .preview-card button { background: none; border: none; color: #ef4444; cursor: pointer; font-weight: bold; }

        .input-shell {
            background: var(--panel); border: 1px solid var(--border); border-radius: 40px;
            padding: 12px 30px; display: flex; align-items: center; gap: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.15rem; resize: none; max-height: 300px; }

        .btn { background: var(--accent); color: black; border: none; padding: 12px 35px; border-radius: 25px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-dim); }
        .btn-stop { background: #ef4444; display: none; color: white; }

        .icon-btn { background: rgba(255,255,255,0.05); border: none; color: white; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .icon-btn:hover { background: var(--accent); color: black; }

        /* Settings Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-inner { background: #0a0a10; border: 1px solid var(--border); padding: 40px; border-radius: 30px; width: 600px; display: flex; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>

    <canvas id="flow-canvas"></canvas>

    <div class="app">
        <aside class="side">
            <div class="brand">
                <h1>HERETIC</h1>
                <p>Pro System Interface</p>
            </div>

            <div class="stats-grid">
                <div class="stat"><label>CPU</label><div id="val-cpu">0%</div></div>
                <div class="stat"><label>GPU</label><div id="val-gpu">0%</div></div>
                <div class="stat"><label>RAM</label><div id="val-ram">0%</div></div>
                <div class="stat"><label>LINK</label><div style="color:#10b981">READY</div></div>
            </div>

            <nav style="display:flex; flex-direction:column; gap:10px">
                <button class="icon-btn" style="width:100%; border-radius:15px; font-size:0.9rem; font-weight:bold" onclick="showSettings()">⚙️ ADVANCED MATRIX</button>
                <button class="icon-btn" style="width:100%; border-radius:15px; font-size:0.9rem; font-weight:bold" onclick="purge()">🧹 PURGE HISTORY</button>
                <button class="icon-btn" style="width:100%; border-radius:15px; font-size:0.9rem; font-weight:bold" onclick="vision()">📷 SYNC VISION</button>
            </nav>

            <div id="trace-view">
                <div class="trace-line"><span class="trace-tag">SYS</span> Core Initialized.</div>
            </div>

            <div style="text-align:center; font-size:0.6rem; color:var(--text-dim); letter-spacing:4px; margin-top:auto">VHALOO // ARCHITECT</div>
        </aside>

        <main class="main">
            <div id="scroller"></div>

            <div class="input-area">
                <div id="file-previews"></div>
                <div id="status-line" style="font-size:0.8rem; color:var(--accent); margin-bottom:10px; display:none; font-weight:bold">● ANALYZING...</div>
                <div class="input-shell">
                    <input type="file" id="file-in" style="display:none" multiple>
                    <button class="icon-btn" onclick="document.getElementById('file-in').click()">📎</button>
                    <textarea id="user-in" rows="1" placeholder="Enter High-Level Instruction..."></textarea>
                    <button id="stop-btn" class="btn btn-stop" onclick="stop()">STOP</button>
                    <button id="send-btn" class="btn" onclick="send()">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-inner">
            <h2>Neural Matrix Configuration</h2>
            <div style="display:flex; flex-direction:column; gap:20px">
                <div>
                    <label>Temperature (Creativity: 0.0 - 2.0)</label>
                    <input type="range" id="m-temp" min="0" max="2" step="0.1" value="0.8" style="width:100%">
                </div>
                <div>
                    <label>Context Limit (Max: 131072)</label>
                    <input type="number" id="m-ctx" value="32768" style="width:100%; background:#000; color:#fff; border:1px solid var(--border); padding:10px">
                </div>
                <div>
                    <label>Background Intensity</label>
                    <input type="range" id="m-flow" min="10" max="400" value="120" style="width:100%">
                </div>
            </div>
            <button class="btn" style="margin-top:20px" onclick="showSettings()">APPLY CONFIGURATION</button>
        </div>
    </div>

    <script>
        const socket = io();
        const scroller = document.getElementById('scroller');
        const userIn = document.getElementById('user-in');
        const traceView = document.getElementById('trace-view');
        const fileIn = document.getElementById('file-in');
        const previewBar = document.getElementById('file-previews');
        
        let attached = [];
        let botBubble = null;
        let thinkBox = null;

        marked.setOptions({ highlight: (c) => hljs.highlightAuto(c).value, breaks: true });

        // Background Flow
        const canvas = document.getElementById('flow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let flowDensity = 120;
        let flowSpeed = 1;

        function initFlow() {
            canvas.width = innerWidth; canvas.height = innerHeight;
            particles = [];
            for(let i=0; i<flowDensity; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
        }
        function drawFlow() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = "rgba(167, 139, 250, 0.05)";
            particles.forEach((p, i) => {
                p.x += p.vx * flowSpeed; p.y += p.vy * flowSpeed;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                particles.forEach((p2, j) => {
                    if(i===j) return;
                    let d = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(d < 120) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                });
            });
            requestAnimationFrame(drawFlow);
        }
        initFlow(); drawFlow(); window.onresize = initFlow;

        // Trace Logs
        socket.on('trace', (d) => {
            const l = document.createElement('div');
            l.className = 'trace-line';
            l.innerHTML = `<span class="trace-tag">${d.lvl}</span> ${d.msg}`;
            traceView.appendChild(l);
            traceView.scrollTop = traceView.scrollHeight;
        });

        // Communication
        async function send() {
            const txt = userIn.value.trim();
            if(!txt && attached.length === 0) return;

            const row = document.createElement('div');
            row.style.display = 'flex'; row.style.flexDirection = 'column';
            row.innerHTML = `<div class="bubble user-bubble">${txt}</div>`;
            scroller.appendChild(row);

            socket.emit('message', { 
                text: txt, 
                files: attached,
                opts: {
                    temperature: parseFloat(document.getElementById('m-temp').value),
                    num_ctx: parseInt(document.getElementById('m-ctx').value)
                }
            });

            userIn.value = ''; attached = []; previewBar.style.display = 'none'; previewBar.innerHTML = '';
            document.getElementById('send-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';
            scroller.scrollTo(0, scroller.scrollHeight);
        }

        socket.on('bot', (d) => {
            if(d.type === 'step') {
                const sl = document.getElementById('status-line');
                sl.style.display = 'block'; sl.textContent = '● ' + d.content;
            } else if(d.type === 'thought') {
                if(!thinkBox) {
                    thinkBox = document.createElement('details');
                    thinkBox.className = 'think-box';
                    thinkBox.open = true;
                    thinkBox.innerHTML = '<summary>NEURAL REASONING</summary><div style="white-space:pre-wrap;"></div>';
                    scroller.appendChild(thinkBox);
                }
                thinkBox.querySelector('div').textContent += d.content;
            } else if(d.type === 'stream') {
                if(!botBubble) {
                    thinkBox = null;
                    botBubble = document.createElement('div');
                    botBubble.className = 'bubble bot-bubble';
                    scroller.appendChild(botBubble);
                }
                botBubble.raw = (botBubble.raw || "") + d.content;
                botBubble.innerHTML = marked.parse(botBubble.raw);
                hljs.highlightAll();
            } else if(d.type === 'end') {
                botBubble = null; thinkBox = null;
                document.getElementById('send-btn').style.display = 'block';
                document.getElementById('stop-btn').style.display = 'none';
                document.getElementById('status-line').style.display = 'none';
            }
            scroller.scrollTo(0, scroller.scrollHeight);
        });

        // HUD Updates
        async function updateHUD() {
            const r = await fetch('/api/status');
            const d = await r.json();
            if(d.stats) {
                document.getElementById('val-cpu').textContent = Math.round(d.stats.cpu) + '%';
                document.getElementById('val-ram').textContent = Math.round(d.stats.ram) + '%';
                if(d.stats.gpus.length) document.getElementById('val-gpu').textContent = Math.round(d.stats.gpus[0].load) + '%';
                flowSpeed = 1 + (d.stats.cpu / 10);
            }
        }
        setInterval(updateHUD, 2000);

        // Files
        fileIn.addEventListener('change', async (e) => {
            previewBar.style.display = 'flex';
            for(const f of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    attached.push({ name: f.name, content: ev.target.result, type: f.type });
                    const card = document.createElement('div');
                    card.className = 'preview-card';
                    card.innerHTML = `<span>${f.name}</span>`;
                    previewBar.appendChild(card);
                };
                if(f.type.startsWith('image/')) reader.readAsDataURL(f);
                else reader.readAsText(f);
            }
        });

        // Utils
        function showSettings() { 
            const m = document.getElementById('settings-modal');
            const isVisible = m.style.display === 'flex';
            m.style.display = isVisible ? 'none' : 'flex';
            if(!isVisible) {
                flowDensity = parseInt(document.getElementById('m-flow').value);
                initFlow();
            }
        }
        function stop() { socket.emit('stop'); }
        function purge() { if(confirm('Wipe core history?')) { socket.emit('clear'); scroller.innerHTML = ''; } }
        function vision() { socket.emit('message', { text: "Provide a detailed visual analysis of my current screen." }); }

        userIn.onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        userIn.oninput = () => { userIn.style.height = 'auto'; userIn.style.height = userIn.scrollHeight + 'px'; };
    </script>
</body>
</html>
