<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Heretic Agent</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #0d0d0f;
            --panel: #16161a;
            --border: #2a2a30;
            --accent: #8b5cf6;
            --text: #ececed;
            --text-dim: #94a3b8;
            --user-bg: #1e1e24;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
        }
        .user-message {
            background: var(--user-bg);
            align-self: flex-end;
            max-width: 80%;
            border: 1px solid var(--border);
        }
        .bot-message {
            background: transparent;
            align-self: flex-start;
            width: 100%;
        }
        .thought-box {
            background: #111114;
            border-left: 3px solid var(--accent);
            padding: 12px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: var(--text-dim);
            border-radius: 4px;
        }
        .thought-box summary { cursor: pointer; font-weight: 600; margin-bottom: 8px; list-style: none; }
        .thought-box summary::-webkit-details-marker { display: none; }
        
        .status-msg { font-size: 0.8rem; color: var(--accent); font-style: italic; margin: 4px 0; }
        
        #input-area {
            background: var(--bg);
            padding: 20px;
            border-top: 1px solid var(--border);
        }
        #input-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            outline: none;
            font-size: 1rem;
            resize: none;
            font-family: inherit;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover { background: var(--border); color: white; }
        .send-btn { background: var(--accent); color: white; padding: 10px 18px; border-radius: 10px; font-weight: 600; }
        
        pre { background: #000 !important; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        code { font-family: 'Fira Code', monospace; }
        
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
        .online { background: #10b981; }
        .offline { background: #ef4444; }
        
        #file-preview {
            display: none;
            padding: 10px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .preview-item { background: var(--border); padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="margin-top:0">Gemma 4 Heretic</h2>
        <div style="margin-bottom:20px">
            <div id="ollama-status"><span class="status-dot offline"></span>Ollama</div>
            <div id="model-status" style="margin-top:8px"><span class="status-dot offline"></span>Model Loaded</div>
        </div>
        
        <div style="flex:1">
            <h4 style="color:var(--text-dim)">Tools</h4>
            <ul style="padding-left:18px; font-size:0.9rem; color:var(--text-dim)">
                <li>Computer Use (Mouse/KB)</li>
                <li>Computer Vision (Screenshot)</li>
                <li>Powershell Execution</li>
                <li>File Read/Write</li>
            </ul>
        </div>
        
        <button class="icon-btn" id="clear-btn" style="width:100%; border:1px solid var(--border); margin-bottom:10px">Clear History</button>
        <div style="font-size:0.8rem; color:var(--text-dim); text-align:center">Signed: Vhaloo</div>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        
        <div id="input-area">
            <div id="file-preview"></div>
            <div id="input-container">
                <input type="file" id="file-input" style="display:none" multiple>
                <button class="icon-btn" id="attach-btn" title="Attach Files">📎</button>
                <textarea id="user-input" rows="1" placeholder="Ask anything... (Shift+Enter for new line)"></textarea>
                <button class="icon-btn send-btn" id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-btn');
        const previewArea = document.getElementById('file-preview');
        
        let attachedImages = [];

        marked.setOptions({
            highlight: function(code, lang) {
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        function appendMessage(type, content, isBot = true) {
            if (type === 'status') {
                const s = document.createElement('div');
                s.className = 'status-msg';
                s.id = 'temp-status';
                s.textContent = '● ' + content;
                chatWindow.appendChild(s);
            } else if (type === 'thought') {
                const t = document.createElement('details');
                t.className = 'thought-box';
                t.innerHTML = `<summary>Thinking Process...</summary><div>${content}</div>`;
                chatWindow.appendChild(t);
            } else {
                // Clear temp statuses
                document.querySelectorAll('.status-msg').forEach(el => el.remove());
                
                const div = document.createElement('div');
                div.className = `message ${isBot ? 'bot-message' : 'user-message'}`;
                div.innerHTML = isBot ? marked.parse(content) : content;
                chatWindow.appendChild(div);
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg && attachedImages.length === 0) return;
            
            appendMessage('text', msg, false);
            socket.emit('user_message', { message: msg, images: attachedImages });
            
            userInput.value = '';
            attachedImages = [];
            previewArea.style.display = 'none';
            previewArea.innerHTML = '';
            userInput.style.height = 'auto';
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            previewArea.innerHTML = '';
            previewArea.style.display = 'flex';
            for (const file of e.target.files) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const base64 = ev.target.result.split(',')[1];
                        attachedImages.push(base64);
                        const item = document.createElement('div');
                        item.className = 'preview-item';
                        item.textContent = file.name;
                        previewArea.appendChild(item);
                    };
                    reader.readAsDataURL(file);
                }
            }
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            socket.emit('clear_history');
            chatWindow.innerHTML = '';
        });

        socket.on('bot_response', (data) => {
            appendMessage(data.type, data.content);
        });

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('ollama-status').querySelector('.status-dot').className = `status-dot ${data.ollama ? 'online' : 'offline'}`;
                document.getElementById('model-status').querySelector('.status-dot').className = `status-dot ${data.model ? 'online' : 'offline'}`;
            } catch (e) {}
        }
        setInterval(updateStatus, 3000);
        updateStatus();

        // Auto-expand textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
