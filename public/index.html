<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heretic OS | Absolute Control</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #020205;
            --panel: rgba(10, 10, 18, 0.95);
            --accent: #8b5cf6;
            --accent-bright: #c084fc;
            --border: rgba(139, 92, 246, 0.25);
            --text: #f1f5f9;
            --text-dim: #475569;
            --danger: #ef4444;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Optimized Neural Background */
        #neural-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        .app-layout { display: flex; height: 100vh; backdrop-filter: blur(25px); }

        /* Sidebar: High-Fidelity Stats & Telemetry */
        .sidebar { 
            width: 360px; background: var(--panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 30px; gap: 20px; z-index: 100;
        }

        .brand h1 { margin: 0; font-size: 1.6rem; letter-spacing: 6px; color: var(--accent-bright); font-weight: 900; text-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }
        .brand p { margin: 4px 0; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .metric-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; border-radius: 12px; position: relative; overflow: hidden; }
        .metric-card label { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .metric-card .val { font-size: 1.1rem; font-weight: 800; color: var(--accent-bright); margin-top: 4px; display: block; }
        .metric-bar { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); transition: width 1s; width: 0%; }

        /* Hyper-Verbose Telemetry Console */
        #telemetry-box { 
            flex: 1; background: rgba(0,0,0,0.6); border: 1px solid var(--border);
            border-radius: 12px; overflow-y: auto; padding: 15px; font-family: 'Fira Code', monospace; font-size: 0.65rem;
            display: flex; flex-direction: column; gap: 6px;
        }
        .tel-line { display: flex; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 4px; opacity: 0.9; }
        .tel-cat { color: var(--accent-bright); font-weight: bold; min-width: 55px; }
        .tel-msg { color: #cbd5e1; white-space: pre-wrap; word-break: break-all; }

        /* Main Interaction Area */
        .main-stage { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        #chat-scroller { flex: 1; overflow-y: auto; padding: 60px 12%; display: flex; flex-direction: column; gap: 40px; scroll-behavior: smooth; }

        .msg-container { width: 100%; display: flex; flex-direction: column; }
        .bubble { 
            padding: 28px; border-radius: 24px; line-height: 1.8; font-size: 1.1rem; 
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
        }
        .user-bubble { align-self: flex-end; max-width: 85%; background: rgba(139, 92, 246, 0.1); border-color: var(--accent); border-radius: 28px 28px 4px 28px; }
        .bot-bubble { align-self: flex-start; width: 100%; }

        /* Transparent Reasoning Process */
        .thought-trace { 
            background: rgba(0,0,0,0.4); border-left: 3px solid var(--accent-bright); 
            padding: 20px; margin-bottom: 25px; border-radius: 6px; font-size: 0.95rem; color: #94a3b8;
        }
        .thought-trace summary { cursor: pointer; color: var(--accent-bright); font-weight: 900; margin-bottom: 12px; outline: none; }

        /* Absolute Control Input Zone */
        .control-zone { padding: 40px 12%; border-top: 1px solid var(--border); background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); }
        
        #file-tray { display: none; gap: 10px; padding-bottom: 15px; flex-wrap: wrap; }
        .file-chip { background: var(--panel); border: 1px solid var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; color: var(--accent-bright); }

        .input-shell {
            background: var(--panel); border: 1px solid var(--border); border-radius: 40px;
            padding: 10px 30px; display: flex; align-items: center; gap: 20px;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
        }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.15rem; resize: none; max-height: 350px; }

        .btn-core { background: var(--accent); color: black; border: none; padding: 12px 35px; border-radius: 30px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-core:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--accent); }
        #btn-stop { background: var(--danger); color: white; display: none; }
        
        .icon-trigger { background: transparent; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; }
        .icon-trigger:hover { color: var(--accent-bright); }

        /* Settings Overhang */
        .matrix-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .matrix-content { background: #0a0a12; border: 1px solid var(--accent); padding: 50px; border-radius: 35px; width: 650px; display: flex; flex-direction: column; gap: 25px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <h1>HERETIC</h1>
                <p>Absolute Neural OS</p>
            </div>

            <div class="metrics-grid">
                <div class="metric-card"><label>CORES</label><span id="v-cpu" class="val">0%</span><div id="b-cpu" class="metric-bar"></div></div>
                <div class="metric-card"><label>NEURAL</label><span id="v-gpu" class="val">0%</span><div id="b-gpu" class="metric-bar"></div></div>
                <div class="metric-card"><label>SYNAPSE</label><span id="v-ram" class="val">0%</span><div id="b-ram" class="metric-bar"></div></div>
                <div class="metric-card"><label>TEMP</label><span id="v-tmp" class="val">0°C</span></div>
            </div>

            <nav style="display:flex; flex-direction:column; gap:10px">
                <button class="btn-core" style="width:100%; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border);" onclick="openMatrix()">⚙️ NEURAL MATRIX</button>
                <button class="btn-core" style="width:100%; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border);" onclick="purge()">🧹 PURGE CORE</button>
                <button class="btn-core" style="width:100%; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border);" onclick="visionSync()">📷 VISION SYNC</button>
            </nav>

            <div id="telemetry-box">
                <div class="tel-line"><span class="tel-cat">SYS</span> Hardware interface ready.</div>
            </div>

            <div style="text-align:center; font-size:0.6rem; color:var(--text-dim); letter-spacing:5px; margin-top:auto; opacity:0.5">VHALOO // NEURAL ARCHITECT</div>
        </aside>

        <main class="main-stage">
            <div id="chat-scroller"></div>

            <div class="control-zone">
                <div id="file-tray"></div>
                <div id="status-pulse" style="font-size:0.75rem; color:var(--accent-bright); margin-bottom:12px; display:none; font-weight:900; letter-spacing:1px">● PROCESSING SEQUENCE...</div>
                <div class="input-shell">
                    <input type="file" id="file-raw" style="display:none" multiple>
                    <button class="icon-trigger" onclick="document.getElementById('file-raw').click()">📎</button>
                    <textarea id="user-msg" rows="1" placeholder="Instruct the Heretic..."></textarea>
                    <button id="btn-stop" class="btn-core" onclick="stopProcess()">STOP</button>
                    <button id="btn-send" class="btn-core" onclick="initiateSend()">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-matrix" class="matrix-modal">
        <div class="matrix-content">
            <h2 style="margin-top:0; letter-spacing:2px">CORE CONFIGURATION</h2>
            <div style="display:flex; flex-direction:column; gap:25px">
                <div>
                    <label style="color:var(--text-dim); font-size:0.8rem">Creativity Flux (Temperature)</label>
                    <input type="range" id="p-temp" min="0" max="2" step="0.1" value="0.8" style="width:100%; margin-top:10px">
                </div>
                <div>
                    <label style="color:var(--text-dim); font-size:0.8rem">Neural Window (Context Size)</label>
                    <input type="number" id="p-ctx" value="32768" style="width:100%; background:#000; color:#fff; border:1px solid var(--border); padding:15px; border-radius:10px; margin-top:10px">
                </div>
                <div>
                    <label style="color:var(--text-dim); font-size:0.8rem">Background Particle Density</label>
                    <input type="range" id="p-flow" min="20" max="500" value="150" style="width:100%; margin-top:10px">
                </div>
            </div>
            <button class="btn-core" style="margin-top:20px" onclick="openMatrix()">APPLY TO CORE</button>
        </div>
    </div>

    <script>
        const socket = io();
        const scroller = document.getElementById('chat-scroller');
        const userMsg = document.getElementById('user-msg');
        const telBox = document.getElementById('telemetry-box');
        const fileRaw = document.getElementById('file-raw');
        const tray = document.getElementById('file-tray');
        
        let files = [];
        let botBubble = null;
        let thoughtBox = null;

        marked.setOptions({ highlight: (c) => hljs.highlightAuto(c).value, breaks: true });

        // Background: Reactive Particle Web
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        let density = 150;
        let speed = 1;

        function initNeural() {
            canvas.width = innerWidth; canvas.height = innerHeight;
            dots = [];
            for(let i=0; i<density; i++) dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
        }
        function drawNeural() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = "rgba(139, 92, 246, 0.04)";
            dots.forEach((d, i) => {
                d.x += d.vx * speed; d.y += d.vy * speed;
                if(d.x<0 || d.x>canvas.width) d.vx*=-1;
                if(d.y<0 || d.y>canvas.height) d.vy*=-1;
                dots.forEach((d2, j) => {
                    if(i===j) return;
                    let dist = Math.hypot(d.x-d2.x, d.y-d2.y);
                    if(dist < 130) { ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d2.x, d2.y); ctx.stroke(); }
                });
            });
            requestAnimationFrame(drawNeural);
        }
        initNeural(); drawNeural(); window.onresize = initNeural;

        // Telemetry Stream
        socket.on('telemetry', (d) => {
            const l = document.createElement('div');
            l.className = 'tel-line';
            l.innerHTML = `<span class="tel-cat">${d.cat}</span> <span class="tel-msg">${d.msg}</span>`;
            telBox.appendChild(l);
            telBox.scrollTop = telBox.scrollHeight;
        });

        // Neural Chain Execution
        function initiateSend() {
            const txt = userMsg.value.trim();
            if(!txt && files.length === 0) return;

            const row = document.createElement('div');
            row.className = 'msg-container';
            row.innerHTML = `<div class="bubble user-bubble">${txt}</div>`;
            scroller.appendChild(row);

            socket.emit('message', { 
                text: txt, 
                files: files,
                opts: {
                    temperature: parseFloat(document.getElementById('p-temp').value),
                    num_ctx: parseInt(document.getElementById('p-ctx').value)
                }
            });

            userMsg.value = ''; files = []; tray.style.display = 'none'; tray.innerHTML = '';
            document.getElementById('btn-send').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'block';
            scroller.scrollTo(0, scroller.scrollHeight);
        }

        socket.on('bot', (d) => {
            if(d.type === 'step') {
                const sp = document.getElementById('status-pulse');
                sp.style.display = 'block'; sp.textContent = '● ' + d.content;
            } else if(d.type === 'thought') {
                if(!thoughtBox) {
                    thoughtBox = document.createElement('details');
                    thoughtBox.className = 'thought-trace';
                    thoughtBox.open = true;
                    thoughtBox.innerHTML = '<summary>NEURAL PLANNING SEQUENCE</summary><div style="white-space:pre-wrap;"></div>';
                    scroller.appendChild(thoughtBox);
                }
                thoughtBox.querySelector('div').textContent += d.content;
            } else if(d.type === 'stream') {
                if(!botBubble) {
                    thoughtBox = null;
                    botBubble = document.createElement('div');
                    botBubble.className = 'bubble bot-bubble';
                    scroller.appendChild(botBubble);
                }
                botBubble.raw = (botBubble.raw || "") + d.content;
                botBubble.innerHTML = marked.parse(botBubble.raw);
                hljs.highlightAll();
            } else if(d.type === 'end') {
                botBubble = null; thoughtBox = null;
                document.getElementById('btn-send').style.display = 'block';
                document.getElementById('btn-stop').style.display = 'none';
                document.getElementById('status-pulse').style.display = 'none';
            }
            scroller.scrollTo(0, scroller.scrollHeight);
        });

        // Hardware Analytics
        async function refreshMetrics() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                if(d.metrics) {
                    const cpu = d.metrics.cpu;
                    document.getElementById('v-cpu').textContent = Math.round(cpu) + '%';
                    document.getElementById('b-cpu').style.width = cpu + '%';
                    document.getElementById('v-ram').textContent = Math.round(d.metrics.ram) + '%';
                    document.getElementById('b-ram').style.width = d.metrics.ram + '%';
                    if(d.metrics.gpus.length) {
                        const gpu = d.metrics.gpus[0];
                        document.getElementById('v-gpu').textContent = Math.round(gpu.load) + '%';
                        document.getElementById('b-gpu').style.width = gpu.load + '%';
                        document.getElementById('v-tmp').textContent = gpu.temp + '°C';
                    }
                    speed = 1 + (cpu / 15);
                }
            } catch(e) {}
        }
        setInterval(refreshMetrics, 1500);

        // Atomic Utilities
        fileRaw.onchange = (e) => {
            tray.style.display = 'flex';
            for(const f of e.target.files) {
                const r = new FileReader();
                r.onload = (ev) => {
                    files.push({ name: f.name, content: ev.target.result });
                    const chip = document.createElement('div');
                    chip.className = 'file-chip'; chip.textContent = f.name;
                    tray.appendChild(chip);
                };
                r.readAsText(f);
            }
        };

        function stopProcess() { socket.emit('stop'); }
        function openMatrix() { 
            const m = document.getElementById('modal-matrix');
            const vis = m.style.display === 'flex';
            m.style.display = vis ? 'none' : 'flex';
            if(!vis) { density = parseInt(document.getElementById('p-flow').value); initNeural(); }
        }
        function purge() { if(confirm('Erase all local memory?')) { socket.emit('clear'); scroller.innerHTML = ''; } }
        function visionSync() { socket.emit('message', { text: "Perform a high-fidelity vision scan of my workspace." }); }

        userMsg.onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); initiateSend(); } };
        userMsg.oninput = () => { userMsg.style.height = 'auto'; userMsg.style.height = userMsg.scrollHeight + 'px'; };
    </script>
</body>
</html>
