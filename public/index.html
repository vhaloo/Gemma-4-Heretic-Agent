<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Heretic Agent</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --panel: #111114;
            --border: #27272a;
            --accent: #a78bfa;
            --text: #fafafa;
            --text-dim: #a1a1aa;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Geist', 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; gap: 24px; }
        #main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        
        .tab-btn { background: transparent; border: 1px solid transparent; color: var(--text-dim); padding: 10px 16px; border-radius: 8px; cursor: pointer; text-align: left; font-weight: 500; transition: 0.2s; }
        .tab-btn.active { background: var(--border); color: var(--accent); border-color: var(--border); }
        .tab-btn:hover:not(.active) { background: #18181b; color: white; }

        .content-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .content-panel.active { display: flex; }

        #chat-window { flex: 1; overflow-y: auto; padding: 40px 10%; display: flex; flex-direction: column; gap: 32px; scroll-behavior: smooth; }
        .message { line-height: 1.6; max-width: 100%; }
        .user-message { background: #18181b; padding: 20px; border-radius: 12px; border: 1px solid var(--border); align-self: flex-end; max-width: 85%; }
        .bot-message { align-self: flex-start; width: 100%; }
        
        .thought-box { background: #0c0c0e; border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
        .thought-box summary { padding: 12px 16px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--accent); user-select: none; }
        .thought-box div { padding: 0 16px 16px 16px; font-size: 0.9rem; color: var(--text-dim); white-space: pre-wrap; }

        #input-area { padding: 24px 10%; border-top: 1px solid var(--border); }
        #input-container { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; display: flex; align-items: flex-end; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; resize: none; min-height: 24px; max-height: 200px; padding: 4px 0; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .badge-ok { background: #064e3b; color: #34d399; }
        .badge-err { background: #450a0a; color: #f87171; }

        /* Models Panel */
        #models-list { display: flex; flex-direction: column; gap: 12px; padding: 20px; }
        .model-card { background: var(--panel); border: 1px solid var(--border); padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        #pull-container { padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
        input[type="text"] { flex: 1; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; }
        
        button.primary { background: var(--accent); color: black; font-weight: 600; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        button.primary:hover { opacity: 0.9; }

        pre { background: #000 !important; padding: 16px; border-radius: 12px; overflow-x: auto; border: 1px solid #1e1e1e; }
        code { font-family: 'Fira Code', 'JetBrains Mono', monospace; }
        .status-line { font-size: 0.8rem; color: var(--accent); margin-bottom: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div>
            <h2 style="margin: 0 0 8px 0; color: var(--accent)">Gemma 4 Heretic</h2>
            <div style="display:flex; gap:8px; flex-wrap:wrap">
                <span id="ollama-status" class="badge badge-err">Ollama Offline</span>
                <span id="model-status" class="badge badge-err">Model Missing</span>
            </div>
        </div>

        <nav style="display:flex; flex-direction:column; gap:4px">
            <button class="tab-btn active" onclick="showTab('chat')">Chat Agent</button>
            <button class="tab-btn" onclick="showTab('models')">Model Manager</button>
        </nav>

        <div style="flex:1"></div>
        <button class="tab-btn" onclick="clearHistory()" style="color:#f87171">Clear Chat History</button>
        <div style="font-size: 0.75rem; color: var(--text-dim); text-align:center">Version 1.2.0 • Signed by Vhaloo</div>
    </div>

    <div id="main">
        <!-- Chat Panel -->
        <div id="panel-chat" class="content-panel active">
            <div id="chat-window"></div>
            <div id="input-area">
                <div id="input-container">
                    <textarea id="user-input" rows="1" placeholder="Type a message or command..."></textarea>
                    <button class="primary" id="send-btn">Send</button>
                </div>
            </div>
        </div>

        <!-- Models Panel -->
        <div id="panel-models" class="content-panel">
            <div id="pull-container">
                <input type="text" id="pull-name" placeholder="Model name (e.g. gemma2)">
                <button class="primary" onclick="pullModel()">Pull Model</button>
            </div>
            <div id="models-list"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        
        marked.setOptions({
            highlight: (code, lang) => hljs.highlightAuto(code).value,
            breaks: true
        });

        function showTab(tab) {
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${tab}`).classList.add('active');
            event.target.classList.add('active');
        }

        function appendMessage(type, content, isBot = true) {
            if (type === 'status') {
                const s = document.createElement('div');
                s.className = 'status-line';
                s.id = 'temp-status';
                s.textContent = '● ' + content;
                chatWindow.appendChild(s);
            } else if (type === 'thought') {
                const t = document.createElement('details');
                t.className = 'thought-box';
                t.innerHTML = `<summary>Deep Reasoning Trace</summary><div>${content}</div>`;
                chatWindow.appendChild(t);
            } else {
                document.querySelectorAll('.status-line').forEach(el => el.remove());
                const div = document.createElement('div');
                div.className = `message ${isBot ? 'bot-message' : 'user-message'}`;
                div.innerHTML = isBot ? marked.parse(content) : content;
                chatWindow.appendChild(div);
            }
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;
            appendMessage('text', msg, false);
            socket.emit('user_message', { message: msg });
            userInput.value = '';
            userInput.style.height = 'auto';
        }

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function clearHistory() {
            if(confirm('Clear all chat history?')) {
                socket.emit('clear_history');
                chatWindow.innerHTML = '';
            }
        }

        socket.on('bot_response', (data) => appendMessage(data.type, data.content));

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const oS = document.getElementById('ollama-status');
                const mS = document.getElementById('model-status');
                
                oS.textContent = data.ollama ? "Ollama Online" : "Ollama Offline";
                oS.className = `badge ${data.ollama ? 'badge-ok' : 'badge-err'}`;
                
                mS.textContent = data.model ? "Gemma 4 Ready" : "Model Missing";
                mS.className = `badge ${data.model ? 'badge-ok' : 'badge-err'}`;

                if (document.getElementById('panel-models').classList.contains('active')) {
                    renderModels(data.models);
                }
            } catch (e) {}
        }

        function renderModels(models) {
            const list = document.getElementById('models-list');
            list.innerHTML = '<h3>Installed Local Models</h3>';
            models.forEach(m => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `<span>${m}</span> <span class="badge badge-ok">Installed</span>`;
                list.appendChild(card);
            });
        }

        async function pullModel() {
            const name = document.getElementById('pull-name').value;
            if(!name) return;
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = "Pulling...";
            
            const res = await fetch('/api/pull', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: name })
            });
            
            const reader = res.body.getReader();
            while(true) {
                const {done, value} = await reader.read();
                if(done) break;
                console.log(new TextDecoder().decode(value));
            }
            btn.disabled = false;
            btn.textContent = "Pull Model";
            updateStatus();
        }

        setInterval(updateStatus, 3000);
        updateStatus();

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
