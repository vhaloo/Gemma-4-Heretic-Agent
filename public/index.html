<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heretic OS | Neural Interface</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #050508;
            --panel: rgba(13, 13, 18, 0.8);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text-dim: #64748b;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        
        /* Animated Background */
        #neural-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .app-container { display: flex; height: 100vh; backdrop-filter: blur(10px); }

        /* Sidebar: Files & Stats */
        .sidebar { 
            width: 320px; background: var(--panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; gap: 20px; padding: 24px;
        }

        .brand h1 { margin: 0; font-size: 1.5rem; letter-spacing: 4px; color: var(--accent); font-weight: 900; }
        .brand p { margin: 4px 0; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }

        .stats-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; border-radius: 12px; }
        .stat-card label { font-size: 0.6rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .stat-card span { font-size: 1rem; font-weight: bold; color: var(--accent); }
        .progress-mini { height: 3px; background: #111; border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        /* Chat Area */
        .main-view { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        #chat-scroller { flex: 1; overflow-y: auto; padding: 60px 15%; display: flex; flex-direction: column; gap: 40px; scroll-behavior: smooth; }
        
        .msg-row { width: 100%; display: flex; flex-direction: column; }
        .bubble { 
            padding: 24px; border-radius: 20px; line-height: 1.8; font-size: 1.1rem;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
        }
        .user-bubble { align-self: flex-end; max-width: 80%; background: rgba(139, 92, 246, 0.1); border-color: var(--accent); }
        .bot-bubble { align-self: flex-start; width: 100%; }

        /* Thinking & Steps */
        .thought-wrap { 
            background: rgba(0,0,0,0.3); border-left: 2px solid var(--accent); 
            padding: 15px; margin-bottom: 15px; border-radius: 4px; font-size: 0.9rem; color: var(--text-dim);
        }
        .step-ticker { color: var(--accent); font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

        /* Input Zone */
        .input-zone { padding: 40px 15%; border-top: 1px solid var(--border); background: rgba(0,0,0,0.4); }
        .input-shell {
            background: var(--panel); border: 1px solid var(--border); border-radius: 40px;
            padding: 12px 28px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.1rem; resize: none; max-height: 250px; }
        
        .action-btn { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }
        .stop-btn { background: #ef4444; display: none; }

        .icon-only { background: transparent; color: var(--text-dim); cursor: pointer; border: none; font-size: 1.2rem; display: flex; align-items: center; }
        .icon-only:hover { color: white; }

        /* Scrollers */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

    <canvas id="neural-bg"></canvas>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <h1>HERETIC</h1>
                <p>Advanced Neural Interface</p>
            </div>

            <div class="stats-box">
                <div class="stat-card">
                    <label>CORES</label><span id="cpu-val">0%</span>
                    <div class="progress-mini"><div id="cpu-bar" class="progress-fill"></div></div>
                </div>
                <div class="stat-card">
                    <label>NEURAL</label><span id="gpu-val">0%</span>
                    <div class="progress-mini"><div id="gpu-bar" class="progress-fill"></div></div>
                </div>
                <div class="stat-card">
                    <label>SYNAPSE</label><span id="ram-val">0%</span>
                    <div class="progress-mini"><div id="ram-bar" class="progress-fill"></div></div>
                </div>
                <div class="stat-card">
                    <label>CORE TEMP</label><span id="tmp-val">0°C</span>
                </div>
            </div>

            <div style="flex:1; overflow-y:auto;">
                <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:10px;">SYSTEM CAPABILITIES</p>
                <ul style="list-style:none; padding:0; font-size:0.85rem; color:var(--text-dim); display:flex; flex-direction:column; gap:12px;">
                    <li>👁️ High-Fidelity Vision</li>
                    <li>🖱️ Direct OS Control</li>
                    <li>📂 Deep File Analytics</li>
                    <li>💻 Multi-Thread Shell</li>
                </ul>
            </div>

            <button class="action-btn" style="width:100%; border-radius:14px; background:rgba(255,255,255,0.05);" onclick="clearAll()">PURGE MEMORY</button>
            <div style="font-size: 0.6rem; color: var(--text-dim); text-align:center; letter-spacing:2px">CONSTRUCTED BY VHALOO</div>
        </aside>

        <!-- Main View -->
        <main class="main-view">
            <div id="chat-scroller"></div>

            <div class="input-zone">
                <div id="status-line" class="step-ticker" style="margin-bottom:10px; display:none;">NEURAL LAYER READY</div>
                <div class="input-shell">
                    <button class="icon-only" onclick="triggerVision()">📷</button>
                    <textarea id="user-input" rows="1" placeholder="Issue a neural command..."></textarea>
                    <button id="stop-btn" class="action-btn stop-btn" onclick="stopNeural()">STOP</button>
                    <button id="send-btn" class="action-btn" onclick="sendMsg()">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        const scroller = document.getElementById('chat-scroller');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusLine = document.getElementById('status-line');

        let botBubble = null;
        let thoughtBox = null;

        marked.setOptions({ highlight: (c) => hljs.highlightAuto(c).value, breaks: true });

        // Background Animation
        const canvas = document.getElementById('neural-bg');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function initBg() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<100; i++) dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
        }
        function drawBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = "rgba(139, 92, 246, 0.08)";
            ctx.lineWidth = 1;
            dots.forEach((d, i) => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx*=-1;
                if(d.y<0 || d.y>canvas.height) d.vy*=-1;
                dots.forEach((d2, j) => {
                    if(i===j) return;
                    let dist = Math.hypot(d.x-d2.x, d.y-d2.y);
                    if(dist < 150) {
                        ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d2.x, d2.y); ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(drawBg);
        }
        initBg(); drawBg(); window.onresize = initBg;

        // Interaction
        function sendMsg() {
            const txt = input.value.trim();
            if(!txt) return;
            appendMsg('user', txt);
            socket.emit('message', { text: txt });
            input.value = ''; input.style.height = 'auto';
            sendBtn.style.display = 'none'; stopBtn.style.display = 'block';
        }

        function appendMsg(role, content) {
            const row = document.createElement('div');
            row.className = 'msg-row';
            row.innerHTML = `<div class="bubble ${role}-bubble">${content}</div>`;
            scroller.appendChild(row);
            scroller.scrollTop = scroller.scrollHeight;
        }

        socket.on('bot', (d) => {
            if(d.type === 'step') {
                statusLine.style.display = 'block';
                statusLine.textContent = '● ' + d.content;
            } else if(d.type === 'thought') {
                if(!thoughtBox) {
                    thoughtBox = document.createElement('details');
                    thoughtBox.className = 'thought-wrap';
                    thoughtBox.open = true;
                    thoughtBox.innerHTML = '<summary>DEEP NEURAL PLANNER</summary><div style="white-space:pre-wrap;"></div>';
                    scroller.appendChild(thoughtBox);
                }
                thoughtBox.querySelector('div').textContent += d.content;
            } else if(d.type === 'stream') {
                if(!botBubble) {
                    thoughtBox = null;
                    const row = document.createElement('div');
                    row.className = 'msg-row';
                    botBubble = document.createElement('div');
                    botBubble.className = 'bubble bot-bubble';
                    row.appendChild(botBubble);
                    scroller.appendChild(row);
                }
                botBubble.raw = (botBubble.raw || "") + d.content;
                botBubble.innerHTML = marked.parse(botBubble.raw);
                hljs.highlightAll();
            } else if(d.type === 'end') {
                botBubble = null; thoughtBox = null;
                sendBtn.style.display = 'block'; stopBtn.style.display = 'none';
                statusLine.style.display = 'none';
            }
            scroller.scrollTop = scroller.scrollHeight;
        });

        // HUD Updates
        async function updateHUD() {
            const r = await fetch('/api/status');
            const d = await r.json();
            if(d.stats) {
                document.getElementById('cpu-val').textContent = Math.round(d.stats.cpu) + '%';
                document.getElementById('cpu-bar').style.width = d.stats.cpu + '%';
                document.getElementById('ram-val').textContent = Math.round(d.stats.ram) + '%';
                document.getElementById('ram-bar').style.width = d.stats.ram + '%';
                if(d.stats.gpus.length) {
                    document.getElementById('gpu-val').textContent = Math.round(d.stats.gpus[0].load) + '%';
                    document.getElementById('gpu-bar').style.width = d.stats.gpus[0].load + '%';
                    document.getElementById('tmp-val').textContent = d.stats.gpus[0].temp + '°C';
                }
            }
        }
        setInterval(updateHUD, 2000);

        // Utils
        function stopNeural() { socket.emit('stop'); stopBtn.style.display = 'none'; sendBtn.style.display = 'block'; }
        function clearAll() { if(confirm('Clear history?')) { socket.emit('clear'); scroller.innerHTML = ''; } }
        function triggerVision() { socket.emit('message', { text: "Scan my screen and describe what you see." }); }

        input.onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } };
        input.oninput = () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; };
    </script>
</body>
</html>
