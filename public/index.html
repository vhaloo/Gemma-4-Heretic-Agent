<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Agent Interface</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #050508;
            --panel: rgba(15, 15, 20, 0.98);
            --accent: #7c3aed;
            --accent-soft: rgba(124, 58, 237, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-muted: #64748b;
            --danger: #ef4444;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }
        
        #bg-flow { position: fixed; inset: 0; z-index: -1; opacity: 0.4; }

        .app-container { display: flex; height: 100vh; backdrop-filter: blur(30px); }

        /* Utility Sidebar */
        .sidebar-nav { 
            width: 70px; background: #000; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 25px; z-index: 1000;
        }
        .nav-btn { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: 0.2s; font-size: 1.1rem; }
        .nav-btn:hover, .nav-btn.active { background: var(--accent); color: white; }

        /* Information Panel */
        .info-panel { 
            width: 340px; background: var(--panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 30px; gap: 25px; position: relative;
        }
        .view-pane { display: none; flex: 1; flex-direction: column; gap: 20px; }
        .view-pane.active { display: flex; }

        .title-block h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: white; font-weight: 700; }
        .title-block p { margin: 5px 0; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* System Metrics */
        .metrics-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .metric-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        .metric-item label { font-size: 0.6rem; color: var(--text-muted); display: block; margin-bottom: 5px; text-transform: uppercase; }
        .metric-item span { font-size: 1.1rem; font-weight: 700; color: var(--accent); }

        /* Activity Log */
        #activity-log { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; overflow-y: auto; padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 5px; }
        .log-tag { font-weight: 700; color: var(--accent); margin-right: 8px; }

        /* Chat Workspace */
        .workspace { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        #message-scroller { flex: 1; overflow-y: auto; padding: 50px 12%; display: flex; flex-direction: column; gap: 35px; scroll-behavior: smooth; }

        .msg-bubble { padding: 28px; border-radius: 20px; line-height: 1.7; font-size: 1.05rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border); position: relative; }
        .user-bubble { align-self: flex-end; max-width: 80%; background: var(--accent-soft); border-color: var(--accent); }
        .agent-bubble { align-self: flex-start; width: 100%; border-left: 4px solid var(--accent); }

        .reasoning-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 20px; margin-bottom: 20px; font-size: 0.9rem; color: #94a3b8; border: 1px dashed var(--border); }
        .reasoning-box summary { cursor: pointer; color: var(--accent); font-weight: 700; margin-bottom: 10px; outline: none; }

        /* Code Rendering */
        pre { background: #000 !important; padding: 20px; border-radius: 12px; border: 1px solid var(--border); position: relative; overflow-x: auto; }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
        .copy-button { position: absolute; top: 12px; right: 12px; background: var(--accent); color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; opacity: 0; transition: 0.2s; }
        pre:hover .copy-button { opacity: 1; }

        /* Interaction Zone */
        .interaction-zone { padding: 35px 12%; border-top: 1px solid var(--border); background: rgba(0,0,0,0.4); }
        #file-previews { display: none; gap: 10px; padding-bottom: 15px; flex-wrap: wrap; }
        .file-tag { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; color: var(--accent); }

        .input-wrapper {
            background: var(--panel); border: 1px solid var(--border); border-radius: 15px;
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.05rem; resize: none; max-height: 250px; }

        .btn { background: var(--accent); color: white; border: none; padding: 12px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #8b5cf6; transform: translateY(-1px); }
        #btn-stop { background: var(--danger); display: none; }

        /* Settings Dialog */
        .dialog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; }
        .dialog-content { background: #0f172a; border: 1px solid var(--border); padding: 40px; border-radius: 20px; width: 500px; display: flex; flex-direction: column; gap: 25px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-flow"></canvas>

    <div class="app-container">
        <nav class="sidebar-nav">
            <div class="nav-btn active" onclick="setTab('chat', this)">💬</div>
            <div class="nav-btn" onclick="setTab('files', this)">📁</div>
            <div class="nav-btn" onclick="setTab('stats', this)">📈</div>
            <div class="nav-btn" onclick="toggleSettings()">⚙️</div>
            <div style="flex:1"></div>
            <div class="nav-btn" style="color:var(--danger)" onclick="clearCore()">🗑️</div>
        </nav>

        <aside class="info-panel">
            <div class="title-block">
                <h1>PROFESSIONAL INTERFACE</h1>
                <p>Advanced Local Assistant</p>
            </div>

            <div id="pane-chat" class="view-pane active">
                <div class="metrics-container">
                    <div class="metric-item"><label>CPU Load</label><span id="m-cpu">0%</span></div>
                    <div class="metric-item"><label>Memory</label><span id="m-ram">0%</span></div>
                    <div class="metric-item"><label>GPU Load</label><span id="m-gpu">0%</span></div>
                    <div class="metric-item"><label>Temperature</label><span id="m-tmp">0°C</span></div>
                </div>
                <div id="activity-log">
                    <div class="log-entry"><span class="log-tag">SYSTEM</span> Interface initialized.</div>
                </div>
            </div>

            <div id="pane-files" class="view-pane">
                <label style="font-size:0.7rem; color:var(--text-muted)">PROJECT EXPLORER</label>
                <div id="explorer-view" style="font-size:0.85rem; display:flex; flex-direction:column; gap:10px; overflow-y:auto"></div>
            </div>

            <div id="pane-stats" class="view-pane">
                <label style="font-size:0.7rem; color:var(--text-muted)">NETWORK TELEMETRY</label>
                <div class="metric-item">Upload: <span id="s-up">0 KB/s</span></div>
                <div class="metric-item">Download: <span id="s-down">0 KB/s</span></div>
            </div>

            <div style="text-align:center; font-size:0.6rem; color:var(--text-muted); letter-spacing:3px; margin-top:auto">VHALOO // ARCHITECT</div>
        </aside>

        <main class="workspace">
            <div id="message-scroller"></div>

            <div class="interaction-zone">
                <div id="file-previews"></div>
                <div id="status-indicator" style="font-size:0.75rem; color:var(--accent); margin-bottom:12px; display:none; font-weight:600">● PROCESSING REQUEST...</div>
                <div class="input-wrapper">
                    <input type="file" id="input-file" style="display:none" multiple>
                    <button onclick="document.getElementById('input-file').click()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.3rem">📎</button>
                    <textarea id="input-text" rows="1" placeholder="Enter your instruction..."></textarea>
                    <button id="btn-stop" class="btn" onclick="stopProcess()">STOP</button>
                    <button id="btn-send" class="btn" onclick="sendMessage()">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-dialog" class="dialog-overlay">
        <div class="dialog-content">
            <h2 style="margin:0; font-size:1.3rem">System Configuration</h2>
            <div style="display:flex; flex-direction:column; gap:20px">
                <div>
                    <label style="font-size:0.8rem; color:var(--text-muted)">Creative Flow (Temperature)</label>
                    <input type="range" id="c-temp" min="0" max="2" step="0.1" value="0.8" style="width:100%; margin-top:10px">
                </div>
                <div>
                    <label style="font-size:0.8rem; color:var(--text-muted)">Processing Memory (Context)</label>
                    <input type="number" id="c-ctx" value="32768" style="width:100%; background:black; color:white; border:1px solid var(--border); padding:12px; border-radius:8px; margin-top:10px">
                </div>
                <div>
                    <label style="font-size:0.8rem; color:var(--text-muted)">Interface Visual Density</label>
                    <input type="range" id="c-flow" min="20" max="500" value="150" style="width:100%; margin-top:10px">
                </div>
            </div>
            <button class="btn" style="margin-top:10px" onclick="toggleSettings()">Apply Changes</button>
        </div>
    </div>

    <script>
        const socket = io();
        const scroller = document.getElementById('message-scroller');
        const inputMsg = document.getElementById('input-text');
        const activityLog = document.getElementById('activity-log');
        const fileInput = document.getElementById('input-file');
        
        let pendingFiles = [];
        let agentBubble = null;
        let reasoning = null;

        marked.setOptions({ highlight: (c) => hljs.highlightAuto(c).value, breaks: true });

        // Tabs
        function setTab(tab, el) {
            document.querySelectorAll('.view-pane').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`pane-${tab}`).classList.add('active');
            el.classList.add('active');
            if(tab === 'files') socket.emit('message', { text: "List the files in my workspace." });
        }

        // Background Flow
        const canvas = document.getElementById('bg-flow');
        const ctx = canvas.getContext('2d');
        let points = [], pCount = 150, pSpeed = 1;
        function initPoints() {
            canvas.width = innerWidth; canvas.height = innerHeight;
            points = [];
            for(let i=0; i<pCount; i++) points.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
        }
        function drawPoints() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = "rgba(124, 58, 237, 0.08)";
            points.forEach((p, i) => {
                p.x += p.vx * pSpeed; p.y += p.vy * pSpeed;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                points.forEach((p2, j) => {
                    if(i===j) return;
                    let d = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(d < 150) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                });
            });
            requestAnimationFrame(drawPoints);
        }
        initPoints(); drawPoints(); window.onresize = initPoints;

        // Telemetry
        socket.on('telemetry', (d) => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-tag">${d.cat}</span> ${d.msg}`;
            activityLog.appendChild(entry);
            activityLog.scrollTop = activityLog.scrollHeight;
        });

        // Communication
        function sendMessage() {
            const val = inputMsg.value.trim();
            if(!val && pendingFiles.length === 0) return;
            const row = document.createElement('div');
            row.innerHTML = `<div class="msg-bubble user-bubble">${val}</div>`;
            scroller.appendChild(row);
            socket.emit('message', { text: val, files: pendingFiles, opts: { temperature: parseFloat(document.getElementById('c-temp').value), num_ctx: parseInt(document.getElementById('c-ctx').value) } });
            inputMsg.value = ''; pendingFiles = []; document.getElementById('file-previews').innerHTML = '';
            document.getElementById('btn-send').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'block';
            scroller.scrollTo(0, scroller.scrollHeight);
        }

        socket.on('bot', (d) => {
            if(d.type === 'step') {
                const si = document.getElementById('status-indicator');
                si.style.display = 'block'; si.textContent = '● ' + d.content;
            } else if(d.type === 'thought') {
                if(!reasoning) {
                    reasoning = document.createElement('details');
                    reasoning.className = 'reasoning-box';
                    reasoning.open = true;
                    reasoning.innerHTML = '<summary>Internal Reasoning</summary><div style="white-space:pre-wrap;"></div>';
                    scroller.appendChild(reasoning);
                }
                reasoning.querySelector('div').textContent += d.content;
            } else if(d.type === 'stream') {
                if(!agentBubble) {
                    reasoning = null;
                    agentBubble = document.createElement('div');
                    agentBubble.className = 'msg-bubble agent-bubble';
                    scroller.appendChild(agentBubble);
                }
                agentBubble.raw = (agentBubble.raw || "") + d.content;
                agentBubble.innerHTML = marked.parse(agentBubble.raw);
                agentBubble.querySelectorAll('pre').forEach(p => {
                    if(!p.querySelector('.copy-button')) {
                        const b = document.createElement('button');
                        b.className = 'copy-button'; b.textContent = 'Copy';
                        b.onclick = () => { navigator.clipboard.writeText(p.innerText); b.textContent = 'Copied'; setTimeout(() => b.textContent = 'Copy', 2000); };
                        p.appendChild(b);
                    }
                });
                hljs.highlightAll();
            } else if(d.type === 'end') {
                agentBubble = null; reasoning = null;
                document.getElementById('btn-send').style.display = 'block';
                document.getElementById('btn-stop').style.display = 'none';
                document.getElementById('status-indicator').style.display = 'none';
            }
            scroller.scrollTo(0, scroller.scrollHeight);
        });

        // Metrics Sync
        let lastIn = 0, lastOut = 0;
        async function syncMetrics() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                if(d.metrics) {
                    document.getElementById('m-cpu').textContent = Math.round(d.metrics.cpu) + '%';
                    document.getElementById('m-ram').textContent = Math.round(d.metrics.ram) + '%';
                    if(d.metrics.gpus.length) {
                        document.getElementById('m-gpu').textContent = Math.round(d.metrics.gpus[0].load) + '%';
                        document.getElementById('m-tmp').textContent = d.metrics.gpus[0].temp + '°C';
                    }
                    const up = Math.round((d.metrics.net.sent - lastOut) / 1024);
                    const down = Math.round((d.metrics.net.recv - lastIn) / 1024);
                    document.getElementById('s-up').textContent = up + ' KB/s';
                    document.getElementById('s-down').textContent = down + ' KB/s';
                    lastOut = d.metrics.net.sent; lastIn = d.metrics.net.recv;
                    pSpeed = 1 + (d.metrics.cpu / 20);
                }
            } catch(e) {}
        }
        setInterval(syncMetrics, 2000);

        // Utilities
        fileInput.onchange = (e) => {
            document.getElementById('file-previews').style.display = 'flex';
            for(const f of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    pendingFiles.push({ name: f.name, content: ev.target.result });
                    const tag = document.createElement('div');
                    tag.className = 'file-tag'; tag.textContent = f.name;
                    document.getElementById('file-previews').appendChild(tag);
                };
                reader.readAsText(f);
            }
        };

        function stopProcess() { socket.emit('stop'); }
        function toggleSettings() { 
            const s = document.getElementById('settings-dialog');
            const vis = s.style.display === 'flex';
            s.style.display = vis ? 'none' : 'flex';
            if(!vis) { pCount = parseInt(document.getElementById('c-flow').value); initPoints(); }
        }
        function clearCore() { if(confirm('Clear history?')) { socket.emit('clear'); scroller.innerHTML = ''; } }

        inputMsg.onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        inputMsg.oninput = () => { inputMsg.style.height = 'auto'; inputMsg.style.height = inputMsg.scrollHeight + 'px'; };
    </script>
</body>
</html>
